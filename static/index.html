<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poem Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f7efe3;
            --ink: #2d2a26;
            --muted: #6b6258;
            --surface: rgba(255, 252, 245, 0.78);
            --surface-strong: #fffdf8;
            --line: #d8ccbe;
            --warm: #e07a5f;
            --warm-deep: #cb5f43;
            --cool: #2a9d8f;
            --shadow: 0 22px 48px rgba(93, 70, 45, 0.12);
            --radius: 20px;
        }

        body {
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 20%, #ffd8ba 0%, transparent 32%),
                radial-gradient(circle at 90% 10%, #b4eadf 0%, transparent 28%),
                repeating-linear-gradient(0deg, rgba(130, 95, 59, 0.05) 0px, rgba(130, 95, 59, 0.05) 1px, transparent 1px, transparent 4px),
                var(--bg);
            padding: 2.2rem 1rem 3rem;
        }

        .container {
            width: min(1100px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 1.3rem;
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 650ms ease forwards;
        }

        .hero {
            padding: 2rem;
            border: 1px solid rgba(185, 166, 144, 0.55);
            background: linear-gradient(145deg, rgba(255, 252, 245, 0.82), rgba(255, 246, 233, 0.62));
            border-radius: calc(var(--radius) + 6px);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(42, 157, 143, 0.12);
            right: -70px;
            bottom: -120px;
            filter: blur(2px);
        }

        .hero h1 {
            font-family: "Fraunces", serif;
            font-size: clamp(1.9rem, 4.5vw, 3.1rem);
            letter-spacing: 0.01em;
            line-height: 1.1;
            margin-bottom: 0.55rem;
        }

        .hero p {
            color: var(--muted);
            max-width: 58ch;
            line-height: 1.65;
            font-size: 0.98rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.3rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid rgba(173, 152, 128, 0.46);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(3px);
            padding: 1.3rem;
        }

        .panel h2 {
            font-family: "Fraunces", serif;
            font-size: 1.35rem;
            margin-bottom: 1rem;
        }

        .inputs {
            display: grid;
            gap: 0.85rem;
        }

        label {
            display: block;
            margin-bottom: 0.35rem;
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--surface-strong);
            color: var(--ink);
            padding: 0.72rem 0.8rem;
            font-size: 0.94rem;
            font-family: "Manrope", sans-serif;
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--cool);
            box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.16);
        }

        .btn {
            margin-top: 0.25rem;
            border: none;
            border-radius: 999px;
            background: linear-gradient(120deg, var(--warm), #f2b880);
            color: #fff;
            font-family: "Manrope", sans-serif;
            font-weight: 700;
            padding: 0.75rem 1.1rem;
            cursor: pointer;
            transition: transform 170ms ease, filter 170ms ease;
        }

        .btn:hover {
            filter: brightness(0.96);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(120deg, var(--cool), #6fcfbe);
        }

        #status {
            margin-top: 0.65rem;
            min-height: 1.2rem;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .status-loading {
            color: var(--cool);
        }

        .status-error {
            color: #b33f2f;
        }

        .status-success {
            color: #216e63;
        }

        .poem-card {
            border-radius: 16px;
            border: 1px solid rgba(173, 152, 128, 0.55);
            background: #fffefb;
            padding: 1rem;
            animation: cardIn 420ms ease both;
        }

        .poem-title {
            font-family: "Fraunces", serif;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: #2f2b26;
        }

        .poem-content {
            white-space: pre-wrap;
            line-height: 1.7;
            color: #3f3932;
            font-size: 0.95rem;
        }

        .meta {
            margin-top: 0.7rem;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .history-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .history-list {
            display: grid;
            gap: 0.75rem;
        }

        .history-item {
            border: 1px solid rgba(173, 152, 128, 0.4);
            border-radius: 14px;
            padding: 0.78rem 0.86rem;
            background: rgba(255, 253, 248, 0.88);
            display: grid;
            gap: 0.34rem;
            animation: cardIn 380ms ease both;
        }

        .history-item h3 {
            font-size: 0.97rem;
            font-family: "Fraunces", serif;
            font-weight: 600;
        }

        .history-item p {
            font-size: 0.88rem;
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.5;
        }

        .chip {
            display: inline-block;
            font-size: 0.76rem;
            background: rgba(224, 122, 95, 0.12);
            color: var(--warm-deep);
            border: 1px solid rgba(224, 122, 95, 0.3);
            padding: 0.13rem 0.48rem;
            border-radius: 999px;
            margin-right: 0.35rem;
        }

        .empty-state {
            color: var(--muted);
            text-align: center;
            padding: 1.4rem 0.8rem;
            border: 1px dashed rgba(173, 152, 128, 0.55);
            border-radius: 12px;
            font-size: 0.9rem;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="hero">
            <h1>Poem Studio</h1>
            <p>Tulis tema, pilih suasana hati, dan tentukan jumlah bait. Sistem akan membuat puisi yang siap dibaca dan tersimpan di riwayat.</p>
        </section>

        <section class="grid">
            <article class="panel">
                <h2>Generate Puisi</h2>
                <div class="inputs">
                    <div>
                        <label for="theme">Tema Puisi</label>
                        <input type="text" id="theme" placeholder="contoh: hujan, senja, perjuangan" />
                    </div>
                    <div>
                        <label for="mood">Suasana Hati</label>
                        <select id="mood">
                            <option value="bahagia">Bahagia</option>
                            <option value="sedih">Sedih</option>
                            <option value="galau">Galau</option>
                            <option value="semangat">Semangat</option>
                        </select>
                    </div>
                    <div>
                        <label for="stanza_count">Jumlah Bait (1-10)</label>
                        <input type="number" id="stanza_count" min="1" max="10" value="2" />
                    </div>
                    <button id="btn-generate" class="btn" onclick="handleGenerate()">Generate Puisi</button>
                    <div id="status"></div>
                </div>
            </article>

            <article class="panel">
                <h2>Puisi Terbaru</h2>
                <div id="result-container" class="empty-state">Belum ada puisi. Buat puisi pertamamu sekarang.</div>
            </article>
        </section>

        <section class="panel">
            <div class="history-head">
                <h2>Riwayat Puisi</h2>
                <button class="btn btn-secondary" style="width:auto;" onclick="loadHistory()">Refresh</button>
            </div>
            <div id="history-container" class="history-list">
                <div class="empty-state">Klik Refresh untuk memuat riwayat puisi.</div>
            </div>
        </section>
    </main>

    <script>
        const BASE_URL = "";

        function setStatus(message, type = "") {
            const status = document.getElementById("status");
            status.textContent = message;
            status.className = type ? `status-${type}` : "";
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleString("id-ID", {
                day: "2-digit",
                month: "short",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function estimateStanzas(content) {
            return content
                .split(/\n\s*\n/g)
                .filter(part => part.trim().length > 0)
                .length;
        }

        function renderPoem(poem) {
            const container = document.getElementById("result-container");
            const stanza = estimateStanzas(poem.content);
            container.className = "poem-card";
            container.innerHTML = `
                <h3 class="poem-title">${poem.title}</h3>
                <p class="poem-content">${poem.content}</p>
                <div class="meta">
                    <span class="chip">${stanza} bait</span>
                    <span>ID ${poem.id}</span>
                    <span>• ${formatDate(poem.created_at)}</span>
                </div>
            `;
        }

        async function handleGenerate() {
            const theme = document.getElementById("theme").value.trim();
            const mood = document.getElementById("mood").value;
            const stanzaCount = parseInt(document.getElementById("stanza_count").value, 10);
            const button = document.getElementById("btn-generate");

            if (!theme) {
                setStatus("Tema puisi wajib diisi.", "error");
                return;
            }

            if (!stanzaCount || stanzaCount < 1 || stanzaCount > 10) {
                setStatus("Jumlah bait harus di antara 1 sampai 10.", "error");
                return;
            }

            button.disabled = true;
            setStatus("Sedang menulis puisi...", "loading");

            try {
                const response = await fetch(`${BASE_URL}/poems/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        theme,
                        mood,
                        stanza_count: stanzaCount
                    })
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "Gagal membuat puisi");
                }

                renderPoem(payload);
                setStatus("Puisi berhasil dibuat.", "success");
                loadHistory();
            } catch (error) {
                setStatus(`Terjadi error: ${error.message}`, "error");
            } finally {
                button.disabled = false;
            }
        }

        async function loadPoemDetail(poemId) {
            try {
                const response = await fetch(`${BASE_URL}/poems/${poemId}`);
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "Gagal mengambil detail puisi");
                }
                renderPoem(payload);
                setStatus(`Menampilkan puisi #${poemId}.`, "success");
            } catch (error) {
                setStatus(`Terjadi error: ${error.message}`, "error");
            }
        }

        async function loadHistory() {
            const container = document.getElementById("history-container");
            container.innerHTML = `<div class="empty-state">Memuat riwayat puisi...</div>`;

            try {
                const response = await fetch(`${BASE_URL}/poems`);
                const poems = await response.json();

                if (!Array.isArray(poems) || poems.length === 0) {
                    container.innerHTML = `<div class="empty-state">Belum ada puisi tersimpan.</div>`;
                    return;
                }

                container.innerHTML = poems.map((poem, index) => `
                    <div class="history-item" style="animation-delay:${Math.min(index * 70, 450)}ms;">
                        <h3>${poem.title}</h3>
                        <p>${poem.content}</p>
                        <div class="meta">
                            <span class="chip">ID ${poem.id}</span>
                            <span>${formatDate(poem.created_at)}</span>
                        </div>
                        <button class="btn btn-secondary" style="width:auto; margin-top:0.45rem;" onclick="loadPoemDetail(${poem.id})">Lihat Detail</button>
                    </div>
                `).join("");
            } catch (error) {
                container.innerHTML = `<div class="empty-state" style="color:#b33f2f;">Gagal memuat riwayat: ${error.message}</div>`;
            }
        }
    </script>
</body>

</html>
